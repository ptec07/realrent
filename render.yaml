services:
  - type: web
    name: realrent-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -e . && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_DATA_SERVICE_KEY
        sync: false
